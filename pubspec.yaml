name: days_tracker
description: A privacy-first, offline Flutter app that tracks how many days the user spends in each country and city.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.2

  # Code Generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Routing
  auto_route: ^10.1.2

  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Background Tasks
  workmanager: ^0.5.2

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0

  # Home Widget
  home_widget: ^0.5.0

  # UI
  flutter_screenutil: ^5.9.0
  flutter_svg: ^2.0.0
  table_calendar: ^3.0.0

  # Utilities
  dartz: ^0.10.1
  equatable: ^2.0.5
  rxdart: ^0.27.0

  # Logging
  logger: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  injectable_generator: ^2.5.2
  auto_route_generator: ^10.1.1
  lint: ^2.3.0
  bloc_test: ^9.1.0


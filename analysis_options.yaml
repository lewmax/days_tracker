include: package:lint/strict.yaml

analyzer:
  plugins:
    - custom_lint
  exclude:
    - '**/*.freezed.dart'
    - '**/*.g.dart'
    - '**/*.gr.dart'
    - '**/*.config.dart'
    - '**/firebase_options_*.dart'
    - 'lib/generated/**'
  language:
    strict-casts: true
    strict-raw-types: true
  errors:
    invalid_annotation_target: ignore
    unrelated_type_equality_checks: error
    included_file_warning: ignore
    missing_required_param: error
    missing_return: error
    record_literal_one_positional_no_trailing_comma: error
    collection_methods_unrelated_type: warning
    deprecated_member_use_from_same_package: ignore
    parameter_assignments: warning
    todo: ignore
    depend_on_referenced_packages: ignore
    constant_identifier_names: ignore
    unreachable_from_main: ignore
    avoid_dynamic_calls: ignore

formatter:
  page_width: 100

linter:
  rules:
    # Util classes are awesome!
    avoid_classes_with_only_static_members: false
    sort_pub_dependencies: false
    sort_unnamed_constructors_first: false
    prefer_single_quotes: true
    prefer_const_constructors_in_immutables: true
    use_super_parameters: true
    use_key_in_widget_constructors: true

bloc:
  rules:
    avoid_flutter_imports: true
    avoid_public_bloc_methods: true
    prefer_file_naming_conventions: true

custom_lint:
  rules:
    # Architecture: features must not import from other features; use core, domain, data
    avoid_cross_feature_imports: true
    # Architecture: same as enforce_layer_dependencies (enable one to avoid duplicates)
    # avoid_layer_dependency_violation: false
    # Bloc/Cubit: check isClosed before emit/add after async gaps
    check_bloc_is_not_closed_after_async: true
    # StatefulWidget: check mounted before setState after async gaps
    check_widget_mounted_after_async: true
    # State: controllers (TextEditingController, Timer, StreamSubscription, etc.) must be disposed/canceled
    dispose_controllers: true
    # Architecture: enforces domain → data → presentation dependency direction
    enforce_layer_dependencies: true
    # Bloc/Cubit: avoid BuildContext in constructor/fields; use callbacks or streams
    no_build_context_in_business_logic: true
    # Iterable: .first/.last/.single without isNotEmpty/length check; use .firstOrNull or guard
    no_direct_iterable_access: true
    # Domain layer: no package:flutter (superseded by ; kept for optional use)
    no_flutter_import_in_domain: false
    # Warn on string literals that look like API keys or secrets
    no_hardcoded_api_keys: true
    # Methods named get* should return a value, not void
    prefer_get_prefix_returns_value: true
    # State/Bloc/Cubit: StreamSubscription from listen() must be stored and canceled in dispose
    prefer_stream_subscription_cancellation: true